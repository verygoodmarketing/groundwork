name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Notify on lint/typecheck failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { context } = require('@actions/github');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const ref = context.ref || context.sha;
            const message = [
              '## CI Failure: Lint & Type Check',
              '',
              `**Branch/Ref:** \`${ref}\``,
              `**Commit:** \`${context.sha.slice(0, 7)}\``,
              `**Run:** [View details](${runUrl})`,
              '',
              'The **Lint & Type Check** job failed. Please review the errors and push a fix.',
              '',
              'See the [CI runbook](#ci-runbook--what-to-do-when-the-build-fails) in README for troubleshooting steps.',
            ].join('\n');

            // Post comment on PR if this is a pull_request event
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: message,
              });
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      # Stub env vars for build — real values injected at deploy time
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
      DATABASE_URL: postgresql://postgres:stub@localhost:5432/stub
      DIRECT_URL: postgresql://postgres:stub@localhost:5432/stub
      NEXT_PUBLIC_APP_URL: https://stub.example.com
      NEXT_PUBLIC_APP_DOMAIN: stub.example.com
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_stub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

      - name: Notify on build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { context } = require('@actions/github');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const ref = context.ref || context.sha;
            const message = [
              '## CI Failure: Build',
              '',
              `**Branch/Ref:** \`${ref}\``,
              `**Commit:** \`${context.sha.slice(0, 7)}\``,
              `**Run:** [View details](${runUrl})`,
              '',
              'The **Build** job failed. Please review the errors and push a fix.',
              '',
              'See the [CI runbook](#ci-runbook--what-to-do-when-the-build-fails) in README for troubleshooting steps.',
            ].join('\n');

            // Post comment on PR if this is a pull_request event
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: message,
              });
            }

